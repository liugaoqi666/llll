<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>掰手指计算器 🖐️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 800px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #e17055;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* 计算器输入区域 */
        .calc-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .calc-input {
            width: 100px;
            height: 60px;
            font-size: 1.8rem;
            text-align: center;
            border: 3px solid #ddd;
            border-radius: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .calc-input:focus {
            border-color: #e17055;
            box-shadow: 0 0 20px rgba(225, 112, 85, 0.3);
        }

        .operator {
            font-size: 2.5rem;
            color: #e17055;
            font-weight: bold;
        }

        .calc-btn {
            padding: 15px 40px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
            transition: all 0.3s ease;
            margin-left: 20px;
        }

        .calc-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.5);
        }

        .calc-btn:active {
            transform: translateY(0);
        }

        .calc-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 动画区域 */
        .animation-area {
            min-height: 350px;
            position: relative;
            margin: 30px 0;
            display: none;
        }

        .animation-area.active {
            display: block;
        }

        /* 计数显示 */
        .count-display {
            font-size: 3rem;
            font-weight: bold;
            color: #e17055;
            margin-bottom: 20px;
        }

        .count-display .current {
            font-size: 4rem;
            color: #6c5ce7;
        }

        /* 手和脚的容器 */
        .hands-feet-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* 手和脚的样式 */
        .hand, .foot {
            position: relative;
            width: 200px;
            height: 200px;
        }

        .hand-label, .foot-label {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* 手指样式 */
        .finger {
            position: absolute;
            width: 30px;
            background: linear-gradient(180deg, #ffeaa7 0%, #fdcb6e 100%);
            border-radius: 15px 15px 10px 10px;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-origin: bottom center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .finger::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 15px;
            background: #ffeaa7;
            border-radius: 50% 50% 0 0;
        }

        .finger.bent {
            transform: rotate(90deg) translateY(-20px);
            background: linear-gradient(180deg, #fab1a0 0%, #e17055 100%);
        }

        /* 手掌 */
        .palm {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 80px;
            background: linear-gradient(180deg, #ffeaa7 0%, #fdcb6e 100%);
            border-radius: 20px 20px 40px 40px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        /* 脚趾样式 */
        .toe {
            position: absolute;
            width: 25px;
            background: linear-gradient(180deg, #dfe6e9 0%, #b2bec3 100%);
            border-radius: 12px 12px 8px 8px;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-origin: bottom center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .toe.bent {
            transform: rotate(90deg) translateY(-15px);
            background: linear-gradient(180deg, #fab1a0 0%, #e17055 100%);
        }

        /* 脚掌 */
        .foot-sole {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 60px;
            background: linear-gradient(180deg, #dfe6e9 0%, #b2bec3 100%);
            border-radius: 30px 30px 50px 50px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        /* 消息气泡 */
        .speech-bubble {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            font-size: 1.1rem;
            color: #333;
            white-space: nowrap;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .speech-bubble.show {
            opacity: 1;
            top: -70px;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border: 10px solid transparent;
            border-top-color: #fff;
        }

        /* 结果显示 */
        .result-area {
            display: none;
            margin-top: 30px;
        }

        .result-area.active {
            display: block;
            animation: fadeInUp 0.5s ease;
        }

        .result {
            font-size: 3rem;
            color: #00b894;
            font-weight: bold;
        }

        .result-emoji {
            font-size: 4rem;
            margin-top: 20px;
        }

        /* 状态消息 */
        .status-message {
            font-size: 1.3rem;
            color: #6c5ce7;
            margin: 20px 0;
            min-height: 40px;
        }

        /* 重置按钮 */
        .reset-btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.4);
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            75% { transform: translateX(10px) rotate(5deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .shake {
            animation: shake 0.5s ease;
        }

        .bounce {
            animation: bounce 0.5s ease;
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.9);
            color: #e17055;
            text-decoration: none;
            border-radius: 30px;
            font-size: 1rem;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateX(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        /* 表情 */
        .face {
            font-size: 2rem;
            margin: 10px 0;
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b894, #00cec9);
            border-radius: 10px;
            transition: width 0.3s ease;
            width: 0%;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .calc-area {
                flex-direction: column;
            }

            .hand, .foot {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← 返回首页</a>

    <div class="container">
        <h1>🖐️ 掰手指计算器 🦶</h1>
        <p class="subtitle">最原始的计算方式，用手指和脚趾帮你算！</p>

        <div class="calc-area">
            <input type="number" class="calc-input" id="num1" placeholder="0" min="-99" max="99">
            <select class="calc-input" id="operator" style="font-size: 1.5rem;">
                <option value="+">+</option>
                <option value="-">−</option>
            </select>
            <input type="number" class="calc-input" id="num2" placeholder="0" min="-99" max="99">
            <button class="calc-btn" id="calcBtn" onclick="startCalculation()">开始计算！</button>
        </div>

        <div class="status-message" id="statusMessage"></div>

        <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="animation-area" id="animationArea">
            <div class="count-display">
                当前数到：<span class="current" id="currentCount">0</span>
            </div>

            <div class="hands-feet-container">
                <div class="hand-container">
                    <div class="hand-label">🖐️ 左手</div>
                    <div class="hand" id="leftHand">
                        <div class="speech-bubble" id="leftHandSpeech"></div>
                        <div class="palm"></div>
                        <div class="finger" id="lf1" style="left: 20px; bottom: 80px; height: 80px;"></div>
                        <div class="finger" id="lf2" style="left: 50px; bottom: 80px; height: 95px;"></div>
                        <div class="finger" id="lf3" style="left: 80px; bottom: 80px; height: 100px;"></div>
                        <div class="finger" id="lf4" style="left: 110px; bottom: 80px; height: 90px;"></div>
                        <div class="finger" id="lf5" style="left: 140px; bottom: 80px; height: 70px;"></div>
                    </div>
                </div>

                <div class="hand-container">
                    <div class="hand-label">🖐️ 右手</div>
                    <div class="hand" id="rightHand">
                        <div class="speech-bubble" id="rightHandSpeech"></div>
                        <div class="palm"></div>
                        <div class="finger" id="rf1" style="left: 20px; bottom: 80px; height: 70px;"></div>
                        <div class="finger" id="rf2" style="left: 50px; bottom: 80px; height: 90px;"></div>
                        <div class="finger" id="rf3" style="left: 80px; bottom: 80px; height: 100px;"></div>
                        <div class="finger" id="rf4" style="left: 110px; bottom: 80px; height: 95px;"></div>
                        <div class="finger" id="rf5" style="left: 140px; bottom: 80px; height: 80px;"></div>
                    </div>
                </div>

                <div class="foot-container">
                    <div class="foot-label">🦶 左脚</div>
                    <div class="foot" id="leftFoot">
                        <div class="speech-bubble" id="leftFootSpeech"></div>
                        <div class="foot-sole"></div>
                        <div class="toe" id="lt1" style="left: 15px; bottom: 60px; height: 45px;"></div>
                        <div class="toe" id="lt2" style="left: 45px; bottom: 60px; height: 55px;"></div>
                        <div class="toe" id="lt3" style="left: 75px; bottom: 60px; height: 50px;"></div>
                        <div class="toe" id="lt4" style="left: 105px; bottom: 60px; height: 45px;"></div>
                        <div class="toe" id="lt5" style="left: 135px; bottom: 60px; height: 35px;"></div>
                    </div>
                </div>

                <div class="foot-container">
                    <div class="foot-label">🦶 右脚</div>
                    <div class="foot" id="rightFoot">
                        <div class="speech-bubble" id="rightFootSpeech"></div>
                        <div class="foot-sole"></div>
                        <div class="toe" id="rt1" style="left: 15px; bottom: 60px; height: 35px;"></div>
                        <div class="toe" id="rt2" style="left: 45px; bottom: 60px; height: 45px;"></div>
                        <div class="toe" id="rt3" style="left: 75px; bottom: 60px; height: 50px;"></div>
                        <div class="toe" id="rt4" style="left: 105px; bottom: 60px; height: 55px;"></div>
                        <div class="toe" id="rt5" style="left: 135px; bottom: 60px; height: 45px;"></div>
                    </div>
                </div>
            </div>

            <div class="face" id="face">🤔</div>
        </div>

        <div class="result-area" id="resultArea">
            <div class="result" id="result"></div>
            <div class="result-emoji" id="resultEmoji">🎉</div>
            <button class="reset-btn" onclick="resetCalculator()">再来一次！</button>
        </div>
    </div>

    <script>
        let currentStep = 0;
        let targetResult = 0;
        let isCalculating = false;
        let animationTimer = null;

        // 搞笑消息
        const funnyMessages = {
            start: [
                "好嘞，开始掰手指！",
                "让我用最原始的方法算算...",
                "手指准备就绪！",
                "这可是祖传的计算方法！"
            ],
            handsFull: [
                "哎呀，手指不够用了！",
                "得脱鞋了...",
                "脚趾：终于轮到我了！",
                "别急，让我脱个鞋..."
            ],
            feetFull: [
                "脚趾也不够了！",
                "重新掰手指吧...",
                "手指：又来？",
                "这数字也太大了吧！"
            ],
            calculating: [
                "嗯...让我想想...",
                "一个一个来...",
                "别催，我在数呢！",
                "这可不能数错啊！"
            ],
            done: [
                "算出来啦！",
                "搞定！",
                "小菜一碟！",
                "我可是计算天才！"
            ]
        };

        // 获取随机消息
        function getRandomMessage(type) {
            const messages = funnyMessages[type];
            return messages[Math.floor(Math.random() * messages.length)];
        }

        // 显示消息
        function showMessage(elementId, message) {
            const bubble = document.getElementById(elementId);
            bubble.textContent = message;
            bubble.classList.add('show');
            setTimeout(() => bubble.classList.remove('show'), 2000);
        }

        // 重置所有手指和脚趾
        function resetAllDigits() {
            for (let i = 1; i <= 5; i++) {
                document.getElementById(`lf${i}`).classList.remove('bent');
                document.getElementById(`rf${i}`).classList.remove('bent');
                document.getElementById(`lt${i}`).classList.remove('bent');
                document.getElementById(`rt${i}`).classList.remove('bent');
            }
        }

        // 弯曲指定的手指/脚趾
        function bendDigit(type, index) {
            const element = document.getElementById(`${type}${index}`);
            element.classList.add('bent');
            element.classList.add('bounce');
            setTimeout(() => element.classList.remove('bounce'), 500);
        }

        // 伸直指定的手指/脚趾
        function straightenDigit(type, index) {
            const element = document.getElementById(`${type}${index}`);
            element.classList.remove('bent');
        }

        // 获取当前应该操作的部位
        function getDigitInfo(step) {
            const cycle = step % 20;
            if (cycle < 5) {
                return { type: 'lf', index: cycle + 1, part: '左手', speechId: 'leftHandSpeech' };
            } else if (cycle < 10) {
                return { type: 'rf', index: cycle - 4, part: '右手', speechId: 'rightHandSpeech' };
            } else if (cycle < 15) {
                return { type: 'lt', index: cycle - 9, part: '左脚', speechId: 'leftFootSpeech' };
            } else {
                return { type: 'rt', index: cycle - 14, part: '右脚', speechId: 'rightFootSpeech' };
            }
        }

        // 更新状态消息
        function updateStatus(message) {
            document.getElementById('statusMessage').textContent = message;
        }

        // 更新进度条
        function updateProgress(current, total) {
            const percentage = Math.min((current / total) * 100, 100);
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        // 更新表情
        function updateFace(emoji) {
            document.getElementById('face').textContent = emoji;
        }

        // 开始计算
        function startCalculation() {
            if (isCalculating) return;

            const num1 = parseInt(document.getElementById('num1').value) || 0;
            const num2 = parseInt(document.getElementById('num2').value) || 0;
            const operator = document.getElementById('operator').value;

            // 计算目标结果
            if (operator === '+') {
                targetResult = num1 + num2;
            } else {
                targetResult = num1 - num2;
            }

            // 计算需要数多少次
            let stepsNeeded;
            if (targetResult >= 0) {
                stepsNeeded = targetResult;
            } else {
                stepsNeeded = Math.abs(targetResult);
            }

            if (stepsNeeded === 0) {
                updateStatus("结果是0，不用数啦！");
                showResult(0);
                return;
            }

            // 开始动画
            isCalculating = true;
            document.getElementById('calcBtn').disabled = true;
            document.getElementById('animationArea').classList.add('active');
            document.getElementById('progressBar').style.display = 'block';
            document.getElementById('resultArea').classList.remove('active');

            resetAllDigits();
            currentStep = 0;

            updateStatus(getRandomMessage('start'));
            updateFace('🤔');

            // 延迟开始动画
            setTimeout(() => {
                animateStep(stepsNeeded, num1, operator, num2);
            }, 1000);
        }

        // 动画步骤
        function animateStep(totalSteps, num1, operator, num2) {
            if (currentStep >= totalSteps) {
                // 计算完成
                finishCalculation(num1, operator, num2);
                return;
            }

            const digitInfo = getDigitInfo(currentStep);

            // 检查是否需要切换到脚趾
            if (currentStep === 10) {
                updateStatus(getRandomMessage('handsFull'));
                updateFace('😅');
                showMessage('leftHandSpeech', '手指用完啦！');
            }

            // 检查是否需要重新掰手指
            if (currentStep === 20) {
                updateStatus(getRandomMessage('feetFull'));
                updateFace('🤯');
                showMessage('leftFootSpeech', '脚趾也不够！');
                resetAllDigits();
            }

            // 弯曲当前手指/脚趾
            bendDigit(digitInfo.type, digitInfo.index);
            showMessage(digitInfo.speechId, `${currentStep + 1}！`);

            // 更新显示
            const displayCount = operator === '+' ? 
                num1 + (currentStep + 1) : 
                num1 - (currentStep + 1);
            document.getElementById('currentCount').textContent = displayCount;
            updateProgress(currentStep + 1, totalSteps);

            // 随机搞笑消息
            if (currentStep % 5 === 4) {
                updateStatus(getRandomMessage('calculating'));
                const faces = ['🤔', '😤', '🧐', '😵‍💫', '🫠'];
                updateFace(faces[Math.floor(Math.random() * faces.length)]);
            }

            currentStep++;

            // 继续下一步
            animationTimer = setTimeout(() => {
                animateStep(totalSteps, num1, operator, num2);
            }, 600);
        }

        // 完成计算
        function finishCalculation(num1, operator, num2) {
            isCalculating = false;
            document.getElementById('calcBtn').disabled = false;

            updateStatus(getRandomMessage('done'));
            updateFace('🥳');

            // 显示结果
            showResult(targetResult);
        }

        // 显示结果
        function showResult(result) {
            const n1 = parseInt(document.getElementById('num1').value) || 0;
            const n2 = parseInt(document.getElementById('num2').value) || 0;
            const op = document.getElementById('operator').value;
            document.getElementById('result').textContent = `${n1} ${op} ${n2} = ${result}`;
            document.getElementById('resultArea').classList.add('active');

            // 根据结果显示不同表情
            let emoji = '🎉';
            if (result > 100) emoji = '🤯';
            else if (result > 50) emoji = '😲';
            else if (result < 0) emoji = '🥶';
            else if (result === 0) emoji = '😐';

            document.getElementById('resultEmoji').textContent = emoji;
        }

        // 重置计算器
        function resetCalculator() {
            isCalculating = false;
            currentStep = 0;
            document.getElementById('calcBtn').disabled = false;
            document.getElementById('animationArea').classList.remove('active');
            document.getElementById('resultArea').classList.remove('active');
            document.getElementById('progressBar').style.display = 'none';
            document.getElementById('statusMessage').textContent = '';
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            resetAllDigits();
            updateFace('🤔');

            if (animationTimer) {
                clearTimeout(animationTimer);
            }
        }

        // 键盘事件
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                startCalculation();
            }
        });
    </script>
</body>
</html>
